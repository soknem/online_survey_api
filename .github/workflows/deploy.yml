name: CI/CD Build and Deploy

on:
  push:
    branches: [ "cicd" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # IMPORTANT: '.' means the root folder where your Dockerfile is
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/survey-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Move to project root on VM
            cd /home/${{ secrets.VM_USER }}/online_survey/sa_online_survey_api/
            
            #pull from git
            git pull
            
            export DOCKER_USER=${{ secrets.DOCKERHUB_USERNAME }}
            
            # 2. Pull new image
            docker compose pull online_survey
            
            # 3. Restart the service
            docker compose up -d
            
            # 4. Cleanup
            docker image prune -f


  notify:
    needs: [build-and-push, deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Get current date
        id: date
        run: echo "DEPLOY_DATE=$(date +'%d/%m/%Y %H:%M:%S')" >> $GITHUB_ENV

      - name: Send Telegram Notification via Curl
        run: |
          # We use a multi-line variable to preserve your formatting and handle special characters
          MESSAGE="ЁЯОЙ *NEW ACTION!* ЁЯОЙ
          ----------------------------------------
          тАв *Project* : \`API\`
          тАв *Domain* : \`sa-api.supersurvey.live\`
          тАв *Repository* : \`${{ github.repository }}\`
          тАв *Author* : \`${{ github.actor }}\`
          тАв *Branch* : \`${{ github.ref_name }}\`
          тАв *Status* : \`${{ job.status == 'success' && 'тЬЕ SUCCESS' || 'тЭМ FAILED' }}\`
          тАв *Deploy Date* : \`${{ env.DEPLOY_DATE }}\`
          тАв *Message* : \`${{ github.event.head_commit.message }}\`
          ----------------------------------------
          [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
  
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" \
            -d "message_thread_id=${{ secrets.TELEGRAM_TOPIC }}" \
            -d "parse_mode=markdown" \
            -d "text=$MESSAGE"