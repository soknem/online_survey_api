name: CI/CD Build and Deploy

on:
  push:
    branches: [ "cicd" ] # Runs when you push to main branch

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: . # Change this if your Dockerfile is in a subfolder
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/survey-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Go to your project folder on the VM
            cd /home/${{ secrets.VM_USER }}/your-project-folder
            
            # 2. Pull the NEW image from Docker Hub
            docker compose pull online_survey
            
            # 3. Restart only the updated service
            docker compose up -d online_survey
            
            # 4. Cleanup old images to save disk space
            docker image prune -f