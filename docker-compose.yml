services:
  # --- Oracle Database Service ---
  oracle-db:
    image: container-registry.oracle.com/database/free:latest
    container_name: oracle-free
    restart: always
    networks:
      - survey-network
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PWD=YourRootPassword123
      - ORACLE_CHARACTERSET=AL32UTF8
      - ORACLE_PDB=FREEPDB1
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./init-scripts:/opt/oracle/scripts/setup
    shm_size: '2gb'
    healthcheck:
      test: ["CMD-SHELL", "tnsping localhost:1521 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --- Spring Boot API Service ---
  online_survey:
    container_name: 'sa-api'
    # Use your Docker Hub image instead of building locally
    image: ${{ secrets.DOCKERHUB_USERNAME }}/survey-backend:latest
    restart: always
    networks:
      - survey-network
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      - TZ=Asia/Bangkok
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_NAME=FREEPDB1
      - DB_USERNAME=sa
      - DB_PASSWORD=sa
      - ACT_PRIVATE=/keys/access-token-private.key
      - ACT_PUBLIC=/keys/access-token-public.key
      - RET_PRIVATE=/keys/refresh-token-private.key
      - RET_PUBLIC=/keys/refresh-token-public.key
      - MAIL_USERNAME=sokname56@gmail.com
      - MAIL_PASSWORD=tcps zgvu rnsf klrf
      - MAIL_HOST=smtp.gmail.com
      - MAIL_HOST_PORT=587
      # These will be read from the .env file on your VM
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    ports:
      - '8080:8080'
    volumes:
      - '/home/media:/home/media'
      - './access-refresh-token-keys:/keys'
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  survey-network:
    driver: bridge

volumes:
  oracle_data: