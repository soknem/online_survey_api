services:
  online_survey:
    container_name: 'sa-api'
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - TZ=Asia/Bangkok
    ports:
      - '8080:8080'
    volumes:
      - '/home/media:/home/media'
      - '/home/keys:/keys'
    healthcheck:
      # If using Actuator, the path is /actuator/health
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s # Give Spring Boot time to start before checking