server:
  port: 8888
spring:
  application:
    name: online_survey
#  servlet: # this is for file upload
#    multipart:
#      max-file-size: 100MB
#      max-request-size: 500MB
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create
    generate-ddl: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: ${MAIL_HOST}
    port: ${MAIL_HOST_PORT}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  profiles:
    active: dev

springdoc:
  swagger-ui:
    path: /ui
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
    org.springframework.jdbc.core: DEBUG
    root: debug
    org.springframework.web: debug
    org.springframework.security: debug
    com.online_survey.survey: debug
    org.springframework.mail: debug
    org.hibernate.engine.internal.Profiler: debug

# This is for the access token
ACCESS_TOKEN_PRIVATE_KEY_PATH: ${ACT_PRIVATE}
ACCESS_TOKEN_PUBLIC_KEY_PATH: ${ACT_PUBLIC}
# This is for the refresh token
REFRESH_TOKEN_PRIVATE_KEY_PATH: ${RET_PRIVATE}
REFRESH_TOKEN_PUBLIC_KEY_PATH: ${RET_PUBLIC}