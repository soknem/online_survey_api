server:
  port: 8080
spring:
  application:
    name: online_survey
  config:
    import: "optional:file:.env[.properties]"
  servlet: # this is for file upload
    multipart:
      max-file-size: 1000MB
      max-request-size: 5000MB
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    generate-ddl: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.OracleDialect

  mail:
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    host: ${MAIL_HOST}
    port: ${MAIL_HOST_PORT}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  profiles:
    active: dev
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        chat:
          options:
#            model: gemma-3-27b-it
            model: gemini-3-flash-preview
#            model: gemini-2.5-flash-lite
            temperature: 0.7
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
ai:
  groq:
    api-key: ${GROQ_API_KEY}
    base-url: https://api.groq.com/openai

minio:
  url: ${minio-url}
  secret-key: ${MINIO_SECRETE_KEY}
  bucket-name: ${minio-bucket}
  access-key: ${MINIO_ACCESS_KEY}

media:
  #media endpoint
  image-end-point: ${image-endpoint}
  video-end-point: ${video-endpoint}
  logo: ${logo-path}
  survey-share: ${survey-share-url}
  survey-share-base-uri: ${survey-base-url}

  #the host that handle show image
  base-uri: ${base-uri}

springdoc:
  swagger-ui:
    path: /ui
  api-docs:
    path: /v3/api-docs
services:
  file-service:
    url: https://resource.supersurvey.live

